name: PR Review with Progress Tracking

# This example demonstrates how to use the track_progress feature to get
# visual progress tracking for PR reviews, similar to v0.x agent mode.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1.0.70
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true

          # Enable progress tracking
          track_progress: true

          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a code review focused on the following areas:

            1. **Potential Bugs**
               - Logical errors and incorrect assumptions
               - Syntax issues and type mismatches
               - Off-by-one errors, null/undefined access, unhandled promise rejections
               - Edge cases that could cause runtime failures

            2. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling
               - Code readability and maintainability

            3. **Security**
               - Potential security vulnerabilities
               - Input sanitization issues
               - Authentication/authorization logic flaws

            4. **Performance**
               - Potential performance bottlenecks
               - Memory leaks or resource issues

            **Instructions for leaving feedback:**
            - Use `mcp__github_inline_comment__create_inline_comment` to leave inline comments on specific lines where you find issues.
            - Post ALL inline comments in a single pass — do not stop after a few comments, go through every changed file completely before finishing.
            - Use the top-level comment for a general summary and cross-cutting observations.
            - Be specific: reference file names, line numbers, and explain why something is a problem and how to fix it.
            - Write all review comments and feedback in Russian.
            - Before posting any inline comment, check the existing review comments on this PR using `Bash(gh pr view --json reviews,comments)`. If a comment about the same issue on the same line already exists from a previous review and has not been resolved, skip it — do not post duplicate comments. Only post a comment if the issue is new or was previously resolved.

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

# When track_progress is enabled:
# - Creates a tracking comment with progress checkboxes
# - Includes all PR context (comments, attachments, images)
# - Updates progress as the review proceeds
# - Marks as completed when done
