server {
    server_name mcp.mymeet.ai;

    location /mcp {
        proxy_pass http://127.0.0.1:3100/mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Critical for SSE streaming in Streamable HTTP
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long timeout for streaming responses
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3100/health;
    }

    # Redirect HTTP to HTTPS
    listen 80;
    # After certbot: listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/mcp.mymeet.ai/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.mymeet.ai/privkey.pem;
}
